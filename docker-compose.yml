services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5

  rag-app:
    build: .
    ports:
      - "8501:8501"
    environment:
      - RAG_OLLAMA_HOST=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ./data:/app/data

  rag-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - RAG_OLLAMA_HOST=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    entrypoint: ["uvicorn", "src.api:app", "--host", "0.0.0.0", "--port", "8000"]

volumes:
  ollama_data:
